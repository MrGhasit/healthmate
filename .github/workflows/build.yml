name: Build HealthMate APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3-pip build-essential git \
            libssl-dev libffi-dev \
            libsdl2-dev libsdl2-image-dev libsdl2-mixer-dev libsdl2-ttf-dev \
            libportmidi-dev libswscale-dev libavformat-dev libavcodec-dev \
            zlib1g-dev libgstreamer1.0-dev gstreamer1.0-plugins-base \
            gstreamer1.0-plugins-good openjdk-17-jdk unzip zip \
            autoconf libtool pkg-config cmake libncurses5 libncurses5-dev \
            libltdl-dev lld

      - name: Cache Buildozer global dir
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ hashFiles('buildozer.spec') }}
          restore-keys: buildozer-

      - name: Install Python packages
        run: |
          pip install --upgrade pip wheel
          pip install buildozer cython==0.29.37

      - name: Build APK (debug)
        run: |
          buildozer -v android debug 2>&1 | tail -200

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: HealthMate-debug-apk
          path: bin/*.apk
          if-no-files-found: error
          retention-days: 30
