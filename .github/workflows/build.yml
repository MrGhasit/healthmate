name: Build HealthMate APK
 
on:
  push:
    branches: [ main ]
  workflow_dispatch:
 
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
 
jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
 
    steps:
      - name: Checkout
        uses: actions/checkout@v4
 
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
 
      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            python3-pip build-essential git \
            libssl-dev libffi-dev \
            zlib1g-dev unzip zip \
            autoconf libtool pkg-config cmake \
            libncurses5 libncurses5-dev \
            libltdl-dev lld ccache \
            openjdk-17-jdk
 
      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
 
      - name: Cache Buildozer global dir
        uses: actions/cache@v4
        with:
          path: |
            ~/.buildozer
            ~/.gradle
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}-v3
          restore-keys: |
            buildozer-${{ runner.os }}-
 
      - name: Install Python packages
        run: |
          pip install --upgrade pip wheel setuptools
          pip install buildozer==1.5.0
          pip install cython==0.29.37
 
      - name: Build APK (debug)
        run: |
          yes | buildozer android debug 2>&1
        env:
          ANDROIDAPI: "33"
          ANDROIDMINAPI: "21"
 
      - name: Show bin directory
        if: always()
        run: |
          ls -la bin/ 2>/dev/null || echo "No bin/ directory found"
 
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: HealthMate-debug-apk
          path: bin/*.apk
          if-no-files-found: warn
          retention-days: 30
 
